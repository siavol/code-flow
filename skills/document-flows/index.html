<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Flow Visualizer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #f6f8fa;
    }

    #sidebar {
      width: 260px;
      min-width: 200px;
      background: #ffffff;
      border-right: 1px solid #d0d7de;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #d0d7de;
    }

    #sidebar-header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #24292f;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    #flow-count {
      font-size: 12px;
      color: #57606a;
    }

    #flow-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .flow-item {
      padding: 7px 16px;
      font-size: 13px;
      color: #24292f;
      cursor: pointer;
      border-left: 3px solid transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.4;
    }

    .flow-item:hover {
      background: #f6f8fa;
    }

    .flow-item.active {
      background: #ddf4ff;
      border-left-color: #0969da;
      color: #0969da;
      font-weight: 500;
    }

    .flow-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d0d7de;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .flow-item.active .flow-dot {
      background: #0969da;
    }

    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #cy {
      width: 100%;
      height: 100%;
    }

    #hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 12px;
      color: #57606a;
      background: rgba(255, 255, 255, 0.92);
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #d0d7de;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    #error-panel {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 32px 40px;
    }

    #error-panel h2 {
      font-size: 15px;
      color: #cf222e;
      margin-bottom: 10px;
    }

    #error-panel p {
      font-size: 13px;
      color: #57606a;
      line-height: 1.6;
    }

    #error-panel code {
      display: inline-block;
      margin-top: 8px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 13px;
      color: #24292f;
    }

    #nav-warning {
      display: none;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #9a6700;
      background: #fff8c5;
      border: 1px solid #d4a72c;
      border-radius: 6px;
      padding: 5px 12px;
      pointer-events: none;
      white-space: nowrap;
    }

    #info-strip {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #ffffff;
      border-top: 1px solid #d0d7de;
      padding: 8px 16px;
      font-size: 13px;
      align-items: center;
      gap: 12px;
    }

    #info-strip-name {
      font-weight: 600;
      color: #24292f;
    }

    #info-strip-detail {
      color: #57606a;
      font-family: monospace;
      font-size: 12px;
    }

    #info-strip-link {
      margin-left: auto;
      font-size: 12px;
      color: #0969da;
      text-decoration: none;
      padding: 3px 10px;
      border: 1px solid #0969da;
      border-radius: 5px;
      white-space: nowrap;
    }

    #info-strip-link:hover {
      background: #ddf4ff;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Flows</h1>
    <span id="flow-count"></span>
  </div>
  <div id="flow-list"></div>
</div>

<div id="main">
  <div id="cy"></div>
  <div id="hint">Click a flow to highlight its path</div>
  <div id="nav-warning">Navigation disabled — add settings.json to enable code navigation</div>
  <div id="info-strip">
    <span id="info-strip-name"></span>
    <span id="info-strip-detail"></span>
    <a id="info-strip-link" href="#">Open ↗</a>
  </div>
  <div id="error-panel">
    <h2>Could not load flows.json</h2>
    <p>Open this folder with a local server:<br>
    <code>npx serve .</code></p>
  </div>
</div>

<script>
  cytoscape.use(cytoscapeDagre);

  let cy;
  let selectedFlowId = null;

  fetch('flows.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      return fetch('settings.json')
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
        .then(settings => init(data, settings));
    })
    .catch(() => {
      document.getElementById('error-panel').style.display = 'block';
      document.getElementById('hint').style.display = 'none';
    });

  function buildNav(settings) {
    if (!settings || !settings.navigation) return null;
    const { provider } = settings.navigation;
    const config = settings.navigation[provider];
    if (!config) return null;
    const providers = {
      vscode: {
        openPackage: (path, entryFile) => `vscode://file/${config.workspacePath}/${entryFile || path}`,
        openStep: (file, line) => `vscode://file/${config.workspacePath}/${file}:${line}`
      },
      github: {
        openPackage: (path) => `https://github.com/${config.repo}/tree/${config.branch}/${path}`,
        openStep: (file, line) => `https://github.com/${config.repo}/blob/${config.branch}/${file}#L${line}`
      }
    };
    return providers[provider] || null;
  }

  function init(data, settings) {
    const nav = buildNav(settings);
    if (!nav) document.getElementById('nav-warning').style.display = 'block';

    const { packages, flows } = data;

    document.getElementById('flow-count').textContent =
      `${flows.length} flow${flows.length !== 1 ? 's' : ''}`;

    // Build sidebar
    const list = document.getElementById('flow-list');
    flows.forEach(flow => {
      const el = document.createElement('div');
      el.className = 'flow-item';
      el.dataset.flowId = flow.id;
      el.innerHTML = `<span class="flow-dot"></span><span>${flow.name}</span>`;
      el.addEventListener('click', () => toggleFlow(flow.id));
      list.appendChild(el);
    });

    // Build elements
    const elements = [];

    packages.forEach(pkg => {
      elements.push({ data: { id: pkg.id, label: pkg.name, path: pkg.path, entryFile: pkg.entryFile || null } });
    });

    flows.forEach(flow => {
      flow.steps.forEach(step => {
        const location = step.location || null;
        elements.push({
          data: {
            id: `${flow.id}__${step.order}`,
            source: step.source,
            target: step.target,
            label: `${step.order}. ${step.label}`,
            flowId: flow.id,
            location
          },
          classes: location ? 'flow-edge' : 'flow-edge no-location'
        });
      });
    });

    cy = cytoscape({
      container: document.getElementById('cy'),
      elements,
      style: [
        {
          selector: 'node',
          style: {
            label: 'data(label)',
            'background-color': '#dbeafe',
            'border-color': '#93c5fd',
            'border-width': 2,
            color: '#1e40af',
            'font-size': 13,
            'font-weight': 500,
            'text-valign': 'center',
            'text-halign': 'center',
            shape: 'round-rectangle',
            width: 'label',
            height: 36,
            padding: '12px',
            'transition-property': 'background-color, border-color, color, opacity',
            'transition-duration': '0.15s'
          }
        },
        {
          selector: 'node.dimmed',
          style: {
            'background-color': '#f3f4f6',
            'border-color': '#e5e7eb',
            color: '#9ca3af',
            opacity: 0.5
          }
        },
        {
          selector: 'node.highlighted',
          style: {
            'background-color': '#fef3c7',
            'border-color': '#f59e0b',
            'border-width': 2.5,
            color: '#78350f'
          }
        },
        {
          selector: 'edge',
          style: {
            'curve-style': 'bezier',
            'target-arrow-shape': 'triangle',
            'arrow-scale': 1.2,
            'line-color': '#f59e0b',
            'target-arrow-color': '#f59e0b',
            label: 'data(label)',
            'font-size': 11,
            color: '#78350f',
            'text-background-color': '#fffbeb',
            'text-background-opacity': 1,
            'text-background-padding': '3px',
            'text-background-shape': 'roundrectangle',
            'text-rotation': 'autorotate',
            width: 2,
            opacity: 0,
            events: 'no',
            'transition-property': 'opacity',
            'transition-duration': '0.15s'
          }
        },
        {
          selector: 'edge.visible',
          style: {
            opacity: 1,
            events: 'yes'
          }
        },
        {
          selector: 'edge.no-location.visible',
          style: {
            'line-color': '#94a3b8',
            'target-arrow-color': '#94a3b8',
            color: '#64748b',
            'text-background-color': '#f8fafc',
            'line-style': 'dashed'
          }
        }
      ],
      layout: {
        name: 'dagre',
        rankDir: 'LR',
        nodeSep: 50,
        rankSep: 120,
        padding: 48,
        animate: false
      },
      wheelSensitivity: 0.2
    });

    let selectedNodeId = null;

    cy.on('tap', 'node', evt => {
      const node = evt.target;
      if (selectedNodeId === node.id()) {
        hideStrip();
        selectedNodeId = null;
        return;
      }
      selectedNodeId = node.id();
      const url = nav ? nav.openPackage(node.data('path'), node.data('entryFile')) : null;
      showStrip(node.data('label'), node.data('path'), url);
    });

    cy.on('tap', 'edge.visible', evt => {
      selectedNodeId = null;
      const edge = evt.target;
      const location = edge.data('location');
      const url = (nav && location) ? nav.openStep(location.file, location.line) : null;
      showStrip(edge.data('label'), location ? `${location.file}:${location.line}` : null, url);
    });
  }

  function showStrip(name, detail, url) {
    const strip = document.getElementById('info-strip');
    document.getElementById('info-strip-name').textContent = name || '';
    document.getElementById('info-strip-detail').textContent = detail || '';
    const link = document.getElementById('info-strip-link');
    if (url) {
      link.style.display = '';
      link.onclick = e => { e.preventDefault(); window.open(url); };
    } else {
      link.style.display = 'none';
    }
    strip.style.display = 'flex';
  }

  function hideStrip() {
    document.getElementById('info-strip').style.display = 'none';
  }

  function toggleFlow(flowId) {
    if (selectedFlowId === flowId) {
      clearSelection();
      return;
    }

    selectedFlowId = flowId;

    document.querySelectorAll('.flow-item').forEach(el => {
      el.classList.toggle('active', el.dataset.flowId === flowId);
    });

    const flowEdges = cy.edges(`[flowId = "${flowId}"]`);
    const involvedNodes = new Set();
    flowEdges.forEach(edge => {
      involvedNodes.add(edge.data('source'));
      involvedNodes.add(edge.data('target'));
    });

    cy.nodes().forEach(node => {
      node.removeClass('dimmed highlighted');
      if (involvedNodes.has(node.id())) {
        node.addClass('highlighted');
      } else {
        node.addClass('dimmed');
      }
    });

    cy.edges().forEach(edge => {
      edge.removeClass('visible');
      if (edge.data('flowId') === flowId) {
        edge.addClass('visible');
      }
    });

    document.getElementById('hint').textContent = 'Click the same flow to deselect';
  }

  function clearSelection() {
    selectedFlowId = null;
    document.querySelectorAll('.flow-item').forEach(el => el.classList.remove('active'));
    cy.nodes().removeClass('dimmed highlighted');
    cy.edges().removeClass('visible');
    document.getElementById('hint').textContent = 'Click a flow to highlight its path';
  }
</script>

</body>
</html>
