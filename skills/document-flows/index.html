<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Flow Visualizer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <style>
    :root {
      --purple-50:  #EEEDFE;
      --purple-200: #AFA9EC;
      --purple-400: #7F77DD;
      --purple-600: #534AB7;
      --purple-800: #3C3489;
      --purple-900: #26215C;
      --gray-border: #E0E0E7;
      --bg-canvas:  #F4F3FC;
      --bg-panel:   #FFFFFF;
      --text-primary:   #1A1A1E;
      --text-secondary: #6F6F80;
      --text-tertiary:  #A0A0AF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-canvas);
      color: var(--text-primary);
    }

    /* ── Top Bar ─────────────────────────────────────────────────────── */

    #top-bar {
      height: 48px;
      min-height: 48px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--gray-border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      z-index: 10;
    }

    #logo-mark {
      width: 18px;
      height: 18px;
      min-width: 18px;
      background: var(--purple-600);
      border-radius: 4px;
    }

    #logo-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    #top-bar-sep {
      width: 1px;
      height: 20px;
      background: var(--gray-border);
      flex-shrink: 0;
    }

    #breadcrumb {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      overflow: hidden;
      min-width: 0;
    }

    #bc-parent { color: var(--text-tertiary); white-space: nowrap; }
    #bc-chevron { color: var(--text-tertiary); flex-shrink: 0; }
    #bc-flow {
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #zoom-controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .zoom-btn {
      height: 28px;
      min-width: 28px;
      padding: 0 8px;
      background: var(--bg-panel);
      border: 1px solid var(--gray-border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }

    .zoom-btn:hover { background: var(--purple-50); border-color: var(--purple-200); }

    /* ── Content wrapper ─────────────────────────────────────────────── */

    #content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left panel ──────────────────────────────────────────────────── */

    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--bg-panel);
      border-right: 1px solid var(--gray-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-label {
      padding: 14px 16px 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      border-bottom: 1px solid var(--gray-border);
    }

    #search-wrap {
      position: relative;
      padding: 10px 12px;
      border-bottom: 1px solid var(--gray-border);
    }

    #search-wrap svg {
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-tertiary);
    }

    #flow-search {
      width: 100%;
      padding: 6px 8px 6px 28px;
      font-size: 12px;
      color: var(--text-primary);
      background: var(--bg-panel);
      border: 1px solid var(--gray-border);
      border-radius: 6px;
      outline: none;
      font-family: inherit;
    }

    #flow-search::placeholder { color: var(--text-tertiary); }
    #flow-search:focus { border-color: var(--purple-400); }

    #flow-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    /* ── Info strip (bottom of canvas, shown on node/edge click) ─────── */

    #info-strip {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-panel);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.07);
      padding: 10px 20px;
      font-size: 13px;
      align-items: center;
      gap: 16px;
    }

    #info-strip-name   { font-weight: 600; color: var(--text-primary); }
    #info-strip-detail { color: var(--text-secondary); font-family: monospace; font-size: 12px; }

    #info-strip-link {
      margin-left: auto;
      font-size: 12px;
      color: var(--purple-600);
      text-decoration: none;
      padding: 4px 12px;
      border: 1px solid var(--purple-200);
      border-radius: 6px;
      background: var(--purple-50);
      white-space: nowrap;
      transition: background 0.12s;
    }

    #info-strip-link:hover { background: var(--purple-200); }

    .flow-item {
      margin: 2px 8px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      line-height: 1.4;
    }

    .flow-item:hover { background: #F7F7FD; }
    .flow-item.active { background: var(--purple-50); }

    .flow-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .flow-item.active .flow-name { color: var(--purple-900); }

    .flow-meta {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .flow-item.active .flow-meta { color: var(--purple-400); }

    /* ── Canvas ──────────────────────────────────────────────────────── */

    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #cy {
      width: 100%;
      height: 100%;
      background: var(--bg-canvas);
    }

    #hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.9);
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--gray-border);
      pointer-events: none;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    #nav-warning {
      display: none;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #9a6700;
      background: #fff8c5;
      border: 1px solid #d4a72c;
      border-radius: 6px;
      padding: 5px 12px;
      pointer-events: none;
      white-space: nowrap;
    }

    #error-panel {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: var(--bg-panel);
      border: 1px solid var(--gray-border);
      border-radius: 8px;
      padding: 32px 40px;
    }

    #error-panel h2 { font-size: 15px; color: #cf222e; margin-bottom: 10px; }
    #error-panel p  { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
    #error-panel code {
      display: inline-block;
      margin-top: 8px;
      background: #f6f8fa;
      border: 1px solid var(--gray-border);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 13px;
    }

    /* ── Right panel — steps ─────────────────────────────────────────── */

    #steps-panel {
      width: 220px;
      min-width: 220px;
      background: var(--bg-panel);
      border-left: 1px solid var(--gray-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #steps-label {
      padding: 14px 16px 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      border-bottom: 1px solid var(--gray-border);
      flex-shrink: 0;
    }

    #steps-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    #steps-empty {
      padding: 24px 16px;
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: center;
    }

    .step-card {
      margin: 4px 8px;
      border: 1px solid var(--gray-border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.1s;
    }

    .step-card:hover { border-color: var(--purple-200); }

    .step-card-header {
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 600;
      background: var(--purple-50);
      color: var(--purple-600);
      transition: background 0.15s, color 0.15s;
    }

    .step-card.active .step-card-header {
      background: var(--purple-600);
      color: var(--purple-50);
    }

    .step-card-body { padding: 8px 12px 10px; }

    .step-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .from-to-block { margin-bottom: 6px; }

    .from-to-key {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 3px;
    }

    .step-pill {
      display: inline-block;
      background: var(--purple-50);
      border: 1px solid var(--purple-200);
      color: var(--purple-600);
      font-size: 11px;
      font-weight: 500;
      border-radius: 10px;
      padding: 2px 8px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    .step-sep {
      height: 1px;
      background: var(--gray-border);
      margin: 8px 0;
    }

    .step-fileref {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-family: monospace;
      color: var(--text-secondary);
      text-decoration: none;
    }

    .step-fileref:hover { color: var(--purple-600); }

    /* ── Legend ──────────────────────────────────────────────────────── */

    #legend {
      padding: 12px 16px;
      border-top: 1px solid var(--gray-border);
      flex-shrink: 0;
    }

    #legend-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ── Top Bar ──────────────────────────────────────────────────────────── -->
<div id="top-bar">
  <div id="logo-mark"></div>
  <span id="logo-text">Code Flow</span>
  <div id="top-bar-sep"></div>
  <div id="breadcrumb">
    <span id="bc-parent"></span>
    <span id="bc-chevron">›</span>
    <span id="bc-flow"></span>
  </div>
  <div id="zoom-controls">
    <button class="zoom-btn" id="btn-fit" style="width:44px">Fit</button>
    <button class="zoom-btn" id="btn-zoom-out">−</button>
    <button class="zoom-btn" id="btn-zoom-reset" style="width:44px">100%</button>
    <button class="zoom-btn" id="btn-zoom-in">+</button>
  </div>
</div>

<!-- ── Content ───────────────────────────────────────────────────────────── -->
<div id="content">

  <!-- Left panel -->
  <div id="sidebar">
    <div id="sidebar-label">Flows · 0</div>
    <div id="search-wrap">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.3"/>
        <line x1="7.7" y1="7.7" x2="11" y2="11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input id="flow-search" type="text" placeholder="Search flows…" autocomplete="off"/>
    </div>
    <div id="flow-list"></div>
    <!-- hidden: keeps backward-compat with tests that assert #flow-count text -->
    <span id="flow-count" style="display:none"></span>
  </div>

  <!-- Canvas -->
  <div id="main">
    <div id="cy"></div>
    <div id="hint">Click a flow to highlight its path</div>
    <div id="nav-warning">Navigation disabled — add settings.json to enable code links</div>
    <div id="error-panel">
      <h2>Could not load flows.json</h2>
      <p>Open this folder with a local server:<br><code>npx serve .</code></p>
    </div>
    <div id="info-strip">
      <span id="info-strip-name"></span>
      <span id="info-strip-detail"></span>
      <a id="info-strip-link" href="#">Open ↗</a>
    </div>
  </div>

  <!-- Right panel -->
  <div id="steps-panel">
    <div id="steps-label">Steps · 0</div>
    <div id="steps-list">
      <div id="steps-empty">Select a flow to see steps</div>
    </div>
    <div id="legend">
      <div id="legend-title">Legend</div>
      <div class="legend-row">
        <div class="legend-swatch" style="background:var(--purple-600);border:1px solid var(--purple-800)"></div>
        Through node
      </div>
      <div class="legend-row">
        <div class="legend-swatch" style="background:var(--purple-50);border:1px solid var(--purple-600)"></div>
        Entry / exit
      </div>
      <div class="legend-row">
        <div class="legend-swatch" style="background:#fff;border:1px solid var(--gray-border);opacity:.4"></div>
        Out-of-flow
      </div>
    </div>
  </div>

</div>

<script>
  cytoscape.use(cytoscapeDagre);

  let cy;
  let nav = null;
  let selectedFlowId  = null;
  let selectedNodeId  = null;
  let selectedEdgeId  = null;
  let allFlows    = [];
  let allPackages = [];

  const breadcrumb   = document.getElementById('breadcrumb');
  const bcParent     = document.getElementById('bc-parent');
  const bcFlow       = document.getElementById('bc-flow');
  const stepsLabel   = document.getElementById('steps-label');
  const stepsList    = document.getElementById('steps-list');
  const sidebarLabel = document.getElementById('sidebar-label');
  const flowSearch   = document.getElementById('flow-search');

  // ── Data loading ────────────────────────────────────────────────────────

  fetch('flows.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data =>
      fetch('settings.json')
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
        .then(settings => init(data, settings))
    )
    .catch(() => {
      document.getElementById('error-panel').style.display = 'block';
      document.getElementById('hint').style.display = 'none';
    });

  // ── Navigation ──────────────────────────────────────────────────────────

  function buildNav(settings) {
    if (!settings || !settings.navigation) return null;
    const { provider } = settings.navigation;
    const config = settings.navigation[provider];
    if (!config) return null;
    const providers = {
      vscode: {
        openPackage: (path, entryFile) => `vscode://file/${config.workspacePath}/${entryFile || path}`,
        openStep:    (file, line)       => `vscode://file/${config.workspacePath}/${file}:${line}`
      },
      github: {
        openPackage: (path)       => `https://github.com/${config.repo}/tree/${config.branch}/${path}`,
        openStep:    (file, line) => `https://github.com/${config.repo}/blob/${config.branch}/${file}#L${line}`
      }
    };
    return providers[provider] || null;
  }

  // ── Init ────────────────────────────────────────────────────────────────

  function init(data, settings) {
    nav = buildNav(settings);
    if (!nav) document.getElementById('nav-warning').style.display = 'block';

    allPackages = data.packages;
    allFlows    = data.flows;

    sidebarLabel.textContent = `Flows · ${allFlows.length}`;
    // Hidden element kept for test backward-compat
    document.getElementById('flow-count').textContent =
      `${allFlows.length} flow${allFlows.length !== 1 ? 's' : ''}`;

    // Sidebar flow list
    const list = document.getElementById('flow-list');
    allFlows.forEach(flow => {
      const pkgIds = new Set(flow.steps.flatMap(s => [s.source, s.target]));
      const nSteps = flow.steps.length;
      const nPkgs  = pkgIds.size;
      const meta   = `${nSteps} step${nSteps !== 1 ? 's' : ''} · ${nPkgs} package${nPkgs !== 1 ? 's' : ''}`;

      const el = document.createElement('div');
      el.className      = 'flow-item';
      el.dataset.flowId = flow.id;
      el.innerHTML      = `<div class="flow-name">${flow.name}</div><div class="flow-meta">${meta}</div>`;
      el.addEventListener('click', () => toggleFlow(flow.id));
      list.appendChild(el);
    });

    // Cytoscape elements
    const elements = [];

    allPackages.forEach(pkg => {
      elements.push({ data: { id: pkg.id, label: pkg.name, path: pkg.path, entryFile: pkg.entryFile || null } });
    });

    allFlows.forEach(flow => {
      flow.steps.forEach(step => {
        elements.push({
          data: {
            id:       `${flow.id}__${step.order}`,
            source:   step.source,
            target:   step.target,
            label:    `${step.order}. ${step.label}`,
            flowId:   flow.id,
            order:    step.order,
            location: step.location || null
          },
          classes: step.location ? 'flow-edge' : 'flow-edge no-location'
        });
      });
    });

    cy = cytoscape({
      container: document.getElementById('cy'),
      elements,
      style: [
        {
          selector: 'node',
          style: {
            label:             'data(label)',
            'background-color': '#ffffff',
            'border-color':    '#E0E0E7',
            'border-width':    1,
            color:             '#1A1A1E',
            'font-size':       13,
            'font-weight':     500,
            'text-valign':     'center',
            'text-halign':     'center',
            shape:             'round-rectangle',
            width:             'label',
            height:            40,
            padding:           '14px',
            'transition-property': 'background-color, border-color, border-width, color, opacity',
            'transition-duration': '0.15s'
          }
        },
        {
          selector: 'node.out-of-flow',
          style: {
            'background-color': '#ffffff',
            'border-color':    '#E0E0E7',
            color:             '#A0A0AF',
            opacity:           0.35
          }
        },
        {
          selector: 'node.in-flow',
          style: {
            'background-color': '#EEEDFE',
            'border-color':    '#534AB7',
            'border-width':    1.5,
            color:             '#26215C'
          }
        },
        {
          selector: 'node.in-flow-through',
          style: {
            'background-color': '#534AB7',
            'border-color':    '#3C3489',
            'border-width':    1.5,
            color:             '#EEEDFE'
          }
        },
        {
          selector: 'node.selected',
          style: {
            'border-width': 3,
            opacity:        1
          }
        },
        {
          selector: 'edge',
          style: {
            'curve-style':        'bezier',
            'target-arrow-shape': 'triangle',
            'arrow-scale':        1.2,
            'line-color':         '#534AB7',
            'target-arrow-color': '#534AB7',
            label:                'data(label)',
            'font-size':          9,
            color:                '#534AB7',
            'text-background-color':   '#ffffff',
            'text-background-opacity': 1,
            'text-background-padding': '4px',
            'text-background-shape':   'roundrectangle',
            'text-border-color':       '#AFA9EC',
            'text-border-width':       1,
            'text-border-opacity':     1,
            'text-rotation':           'none',
            width:                2.5,
            opacity:              0,
            events:               'no',
            'transition-property': 'opacity',
            'transition-duration': '0.15s'
          }
        },
        {
          selector: 'edge.visible',
          style: { opacity: 1, events: 'yes' }
        },
        {
          selector: 'edge.no-location.visible',
          style: {
            'line-color':         '#AFA9EC',
            'target-arrow-color': '#AFA9EC',
            'line-style':         'dashed'
          }
        },
        {
          selector: 'edge.selected',
          style: {
            'line-color':         '#3C3489',
            'target-arrow-color': '#3C3489',
            width:                3
          }
        }
      ],
      layout: {
        name:    'dagre',
        rankDir: 'TB',
        nodeSep: 60,
        rankSep: 80,
        padding: 48,
        animate: false
      },
      wheelSensitivity: 0.2
    });

    // Node tap — toggle selected, show info strip
    cy.on('tap', 'node', evt => {
      const node = evt.target;
      if (selectedNodeId === node.id()) {
        node.removeClass('selected');
        hideStrip();
        selectedNodeId = null;
        return;
      }
      cy.nodes().removeClass('selected');
      cy.edges().removeClass('selected');
      selectedEdgeId = null;
      node.addClass('selected');
      selectedNodeId = node.id();
      const url = nav ? nav.openPackage(node.data('path'), node.data('entryFile')) : null;
      showStrip(node.data('label'), node.data('path'), url);
    });

    // Edge tap — show info strip + highlight step card
    cy.on('tap', 'edge.visible', evt => {
      cy.nodes().removeClass('selected');
      cy.edges().removeClass('selected');
      selectedNodeId = null;
      const edge = evt.target;
      edge.addClass('selected');
      selectedEdgeId = edge.id();
      const location = edge.data('location');
      const url = (nav && location) ? nav.openStep(location.file, location.line) : null;
      showStrip(edge.data('label'), location ? `${location.file}:${location.line}` : null, url);
      setActiveStep(edge.data('order'));
    });

    // Tap on background — deselect
    cy.on('tap', evt => {
      if (evt.target === cy) {
        cy.nodes().removeClass('selected');
        cy.edges().removeClass('selected');
        selectedNodeId = null;
        selectedEdgeId = null;
        if (selectedFlowId) setActiveStep(null);
      }
    });

    // Zoom buttons
    document.getElementById('btn-fit').addEventListener('click', () => cy.fit());
    document.getElementById('btn-zoom-out').addEventListener('click', () =>
      cy.zoom({ level: cy.zoom() * 0.8, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } })
    );
    document.getElementById('btn-zoom-in').addEventListener('click', () =>
      cy.zoom({ level: cy.zoom() * 1.25, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } })
    );
    document.getElementById('btn-zoom-reset').addEventListener('click', () => { cy.zoom(1); cy.center(); });

    // Search
    flowSearch.addEventListener('input', () => {
      const q = flowSearch.value.toLowerCase();
      document.querySelectorAll('.flow-item').forEach(el => {
        el.style.display = el.querySelector('.flow-name').textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  }

  // ── Info strip ─────────────────────────────────────────────────────────

  function showStrip(name, detail, url) {
    const strip = document.getElementById('info-strip');
    document.getElementById('info-strip-name').textContent   = name   || '';
    document.getElementById('info-strip-detail').textContent = detail || '';
    const link = document.getElementById('info-strip-link');
    if (url) {
      link.style.display = '';
      link.onclick = e => { e.preventDefault(); window.open(url); };
    } else {
      link.style.display = 'none';
    }
    strip.style.display = 'flex';
  }

  function hideStrip() {
    document.getElementById('info-strip').style.display = 'none';
  }

  // ── Flow selection ──────────────────────────────────────────────────────

  function classifyNode(nodeId, steps) {
    const asSrc = steps.some(s => s.source === nodeId);
    const asTgt = steps.some(s => s.target === nodeId);
    if (asSrc && asTgt) return 'in-flow-through';
    if (asSrc || asTgt) return 'in-flow';
    return 'out-of-flow';
  }

  function toggleFlow(flowId) {
    if (selectedFlowId === flowId) { clearSelection(); return; }

    selectedFlowId = flowId;
    const flow = allFlows.find(f => f.id === flowId);

    document.querySelectorAll('.flow-item').forEach(el =>
      el.classList.toggle('active', el.dataset.flowId === flowId)
    );

    cy.nodes().forEach(node => {
      node.removeClass('in-flow in-flow-through out-of-flow selected');
      node.addClass(classifyNode(node.id(), flow.steps));
    });

    cy.edges().forEach(edge => {
      edge.removeClass('visible selected');
      if (edge.data('flowId') === flowId) edge.addClass('visible');
    });

    updateBreadcrumb(flow);
    renderSteps(flow);
    document.getElementById('hint').textContent = 'Click the same flow to deselect · click a step or edge for details';
  }

  function clearSelection() {
    selectedFlowId = null;
    document.querySelectorAll('.flow-item').forEach(el => el.classList.remove('active'));
    cy.nodes().removeClass('in-flow in-flow-through out-of-flow selected');
    cy.edges().removeClass('visible selected');
    selectedNodeId = null;
    selectedEdgeId = null;
    hideStrip();
    updateBreadcrumb(null);
    renderSteps(null);
    document.getElementById('hint').textContent = 'Click a flow to highlight its path';
  }

  // ── Breadcrumb ──────────────────────────────────────────────────────────

  function updateBreadcrumb(flow) {
    if (!flow || !flow.steps.length) {
      breadcrumb.style.display = 'none';
      return;
    }
    const firstPkg = allPackages.find(p => p.id === flow.steps[0].source);
    bcParent.textContent = firstPkg ? firstPkg.name : '';
    bcFlow.textContent   = flow.name;
    breadcrumb.style.display = 'flex';
  }

  // ── Steps panel ─────────────────────────────────────────────────────────

  function renderSteps(flow) {
    stepsList.innerHTML = '';

    if (!flow) {
      stepsLabel.textContent = 'Steps · 0';
      const empty = document.createElement('div');
      empty.id          = 'steps-empty';
      empty.textContent = 'Select a flow to see steps';
      stepsList.appendChild(empty);
      return;
    }

    stepsLabel.textContent = `Steps · ${flow.steps.length}`;

    const pkgName = id => (allPackages.find(p => p.id === id) || { name: id }).name;

    flow.steps.forEach((step, i) => {
      const loc    = step.location;
      const fileRef = loc ? `${loc.file}:${loc.line}` : null;
      const url    = (nav && loc) ? nav.openStep(loc.file, loc.line) : null;

      const card = document.createElement('div');
      card.className    = 'step-card' + (i === 0 ? ' active' : '');
      card.dataset.order = step.order;

      const fileHtml = fileRef
        ? `<div class="step-sep"></div>
           ${url
             ? `<a class="step-fileref" href="${url}" target="_blank">${docIconSvg()}${escHtml(fileRef)}</a>`
             : `<span class="step-fileref">${docIconSvg()}${escHtml(fileRef)}</span>`}`
        : '';

      card.innerHTML = `
        <div class="step-card-header">Step ${step.order}</div>
        <div class="step-card-body">
          <div class="step-label">${escHtml(step.label)}</div>
          <div class="from-to-block">
            <div class="from-to-key">From</div>
            <span class="step-pill">${escHtml(pkgName(step.source))}</span>
          </div>
          <div class="from-to-block">
            <div class="from-to-key">To</div>
            <span class="step-pill">${escHtml(pkgName(step.target))}</span>
          </div>
          ${fileHtml}
        </div>`;

      card.addEventListener('click', e => {
        // Don't re-fire if user clicked a link inside
        if (e.target.closest('a')) return;
        if (!cy) return;
        cy.edges().removeClass('selected');
        cy.getElementById(`${flow.id}__${step.order}`).addClass('selected');
        setActiveStep(step.order);
      });

      stepsList.appendChild(card);
    });
  }

  function setActiveStep(order) {
    document.querySelectorAll('.step-card').forEach(card => {
      card.classList.toggle('active', order !== null && Number(card.dataset.order) === order);
    });
  }

  // ── Helpers ─────────────────────────────────────────────────────────────

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function docIconSvg() {
    return `<svg width="11" height="13" viewBox="0 0 11 13" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <path d="M1.5 0.5h5l3.5 3.5V12.5h-8.5V0.5z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
      <path d="M6 0.5V4.5h3.5" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
      <line x1="3" y1="7"   x2="8"  y2="7"   stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <line x1="3" y1="9.5" x2="6.5" y2="9.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    </svg>`;
  }
</script>

</body>
</html>
